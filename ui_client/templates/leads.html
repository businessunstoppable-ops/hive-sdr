{% extends "base.html" %}
{% block content %}
<h2>All Leads</h2>
<table border="1">
    <tr><th>Name</th><th>Score</th><th>Status</th><th>Created</th></tr>
    {% for lead in leads %}
    <tr>
        <td><a href="/lead/{{ lead.id }}">{{ lead.name }}</a></td>
        <td>{{ lead.score }}</td>
        <td>{{ lead.status }}</td>
        <td>{{ lead.created_at }}</td>
    </tr>
    {% else %}
    <tr><td colspan="4">No leads.</td></tr>
    {% endfor %}
</table>
{% endblock %}
